<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="45%"  stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="64" height="64" rx="14" fill="url(#shine)"/>

  <!-- Open book icon (white) -->
  <!-- Left page -->
  <path d="M10 18 C10 16 12 15 14 15.5 L30 20 L30 48 L14 43 C12 42.5 10 41 10 39 Z"
        fill="white" fill-opacity="0.92"/>
  <!-- Right page -->
  <path d="M54 18 C54 16 52 15 50 15.5 L34 20 L34 48 L50 43 C52 42.5 54 41 54 39 Z"
        fill="white" fill-opacity="0.75"/>
  <!-- Spine line -->
  <line x1="32" y1="19" x2="32" y2="48" stroke="white" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Lines on left page -->
  <line x1="15" y1="26" x2="28" y2="28.5" stroke="white" stroke-width="1.5" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="15" y1="31" x2="28" y2="33.5" stroke="white" stroke-width="1.5" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="15" y1="36" x2="28" y2="38.5" stroke="white" stroke-width="1.5" stroke-opacity="0.45" stroke-linecap="round"/>
  <!-- Lines on right page -->
  <line x1="49" y1="26" x2="36" y2="28.5" stroke="white" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="49" y1="31" x2="36" y2="33.5" stroke="white" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="49" y1="36" x2="36" y2="38.5" stroke="white" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>
</svg>
